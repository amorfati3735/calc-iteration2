<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#EDEBF2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0D0B1A" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="CALC — personal expense and debt tracker" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>calc</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      html, body { background-color: #EDEBF2; margin: 0; }
      @media (prefers-color-scheme: dark) {
        html, body { background-color: #0D0B1A; }
      }
      /* Prevent flash + give a centered 'loading' affordance until React mounts */
      #root:empty::before {
        content: "(=^･ω･^=)";
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: ui-monospace, SFMono-Regular, monospace;
        font-size: 1.25rem;
        opacity: 0.4;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
